# Raad LMS Frontend Nginx Configuration
# Copy this file to: /usr/local/etc/nginx/servers/raad-lms-frontend.conf
# Then run: sudo nginx -s reload

server {
    listen 3000;
    server_name _;

    root /Users/rtamedia/dev/personal/raad-lms-frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /usr/local/var/log/nginx/raad-lms-frontend-access.log;
    error_log /usr/local/var/log/nginx/raad-lms-frontend-error.log;

    # Static file handling with caching
    location ~* \.(?:js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
