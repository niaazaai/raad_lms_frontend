services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Raad LMS}
        VITE_APP_URL: ${VITE_APP_URL:-http://127.0.0.1}
    image: raad-frontend:${APP_IMAGE_TAG:-local}
    container_name: raad-frontend
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      - raad-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  raad-network:
    external: true
